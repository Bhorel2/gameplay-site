    header {
      background: #1e293b;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }
    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: #000;
      cursor: pointer;
      font-weight: bold;
    }
    #gameArea {
      margin-top: 30px;
      text-align: center;
    }
    canvas {
      background: #000;
      border-radius: 10px;
      display: block;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <header>🎮 GamePlay - Jogos Online</header>
  <div class="container">
    <div class="card">
      <h3>Jogo da Bolinha</h3>
      <button onclick="startGame()">Jogar</button>
    </div>
  </div>
  <div id="gameArea">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
  </div>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let x, y, dx, dy;
    let gameRunning = false;

    function resetGame() {
      x = 200;
      y = 200;
      dx = 2;
      dy = 2;
    }

    function drawBall() {
      ctx.beginPath();
      ctx.arc(x, y, 10, 0, Math.PI * 2);
      ctx.fillStyle = '#22c55e';
      ctx.fill();
      ctx.closePath();
    }

    function draw() {
      if (!gameRunning) return;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBall();

      if (x + dx > canvas.width || x + dx < 0) dx = -dx;
      if (y + dy > canvas.height || y + dy < 0) dy = -dy;

      x += dx;
      y += dy;

      requestAnimationFrame(draw);
    }

    function startGame() {
      if (gameRunning) return; // evita múltiplos loops
      gameRunning = true;
      resetGame();
      draw();
    }
  </script>
</body>
</html>
